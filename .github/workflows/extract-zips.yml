name: Extract Zip Files

on:
  push:
    branches:
      - main
      - claude/unzip-extract-action-yrmk45
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract app.zip
        uses: ihiroky/extract-action@v1
        with:
          file_path: app.zip

      - name: Extract components.zip
        uses: ihiroky/extract-action@v1
        with:
          file_path: components.zip

      - name: Extract lib.zip
        uses: ihiroky/extract-action@v1
        with:
          file_path: lib.zip

      - name: Extract public.zip
        uses: ihiroky/extract-action@v1
        with:
          file_path: public.zip

      - name: Commit and push extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: extract zip files into folders"
          git push
